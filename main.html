<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	
 <form>
    <h2>Dog Adoption Form</h2>

    <!-- Name -->
    <input type="text" id="name" placeholder="Name" required>

    <!-- Phone -->
    <input type="text" id="phone" placeholder="Phone Number" required>

    <!-- Address -->
    <input type="text" id="address" placeholder="Address" required>

    <!-- Checkbox -->
    <div class="checkbox-container">
      <input type="checkbox" id="checkbox" value="Have you ever lived with a Dog before?">
      <label for="checkbox">Have you ever lived with a Dog before?</label>
    </div>

    <!-- Multi Select -->
    <label for="breeds">Please select your preferred breeds:</label><br><br>

<select id="multiselect" name="select" type="select" multiple size="4">
  <option value="labrador">Labrador</option>
  <option value="germanshepherd">German Shepherd</option>
  <option value="bulldog">Bulldog</option>
  <option value="Husky">Husky</option>
</select>

    <!-- Submit -->
    <button type="submit" id="submit">Submit</button>

  </form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
